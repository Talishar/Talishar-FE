<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="referrer" content="no-referrer-when-downgrade">
  <title>Ad</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
    }
    #ad-slot {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>
  <div id="ad-slot"></div>
  <script>
    (function () {
      try {
        var params = new URLSearchParams(window.location.search);
        // Only allow safe characters in placement to prevent attribute injection.
        var placement = (params.get('placement') || '').replace(/[^a-z0-9_-]/gi, '');
        if (!placement) return;

        var slot = document.getElementById('ad-slot');
        slot.setAttribute('data-ad', placement);
        slot.id = 'rev-' + placement;

        var script = document.createElement('script');
        script.src = 'https://js.rev.iq/talishar.net';
        script.async = true;
        document.head.appendChild(script);
      } catch (e) {
        // No ad is better than a broken page.
      }
    })();
  </script>
</body>
</html>
